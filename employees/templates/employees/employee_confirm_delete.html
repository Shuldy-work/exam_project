{% extends 'employees/base.html' %}
{% block title %}Удаление сотрудника{% endblock %}
{% block content %}
<h1>Удалить сотрудника?</h1>
<p>Вы уверены, что хотите удалить <strong>"{{ employee }}"</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'employees:employee_list' %}" class="btn btn-secondary">Нет, отмена</a>
</form>
{% endblock %}
