{% extends 'employees/base.html' %}
{% block title %}{% if employee %}Редактирование{% else %}Создание{% endif %} сотрудника{% endblock %}
{% block content %}
<h1>{% if employee %}Редактирование сотрудника{% else %}Новый сотрудник{% endif %}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{% url 'employees:employee_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
